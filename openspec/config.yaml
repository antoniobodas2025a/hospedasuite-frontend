# OpenSpec Configuration — hospedasuite-platform
# See ~/.pi/agent/npm/node_modules/gentle-pi/docs for full schema reference.

project:
  name: hospedasuite-platform
  description: Hotel management SaaS — onboarding wizard, OTA, property management
  language: typescript
  framework: nextjs

stack:
  runtime: bun
  ui: tailwind + shadcn/ui + radix-ui
  backend: supabase (auth, postgres, storage/r2)
  forms: react-hook-form + zod
  state: zustand
  i18n: next-intl

testing:
  runner: vitest
  command: vitest run
  watch_command: vitest
  watch_alias: bun test:watch
  e2e: playwright
  e2e_command: npx playwright test
  coverage:
    available: true
    configured: false
    providers:
      - "@vitest/coverage-v8"
      - "@vitest/coverage-istanbul"
    command: "vitest --coverage (requires bun add -D @vitest/coverage-v8)"
  test_patterns:
    - src/__tests__/**/*.test.ts
    - src/lib/__tests__/**/*.test.ts
    - src/components/**/__tests__/**/*.test.ts
    - src/__tests__/**/*.test.tsx
  component_env: jsdom (per-file // @vitest-environment jsdom)
  setup: src/__tests__/vitest-bun-polyfills.ts

linting:
  runner: eslint
  command: npx eslint
  precommit: husky + lint-staged

typecheck:
  runner: typescript
  command: tsc --noEmit

ci:
  provider: github-actions
  workflow: .github/workflows/ci.yml
  jobs:
    - lint
    - typecheck
    - test (vitest)
    - build

strict_tdd: true

conventions:
  commits: conventional-commits
  code_style: eslint-config-next
  imports: path aliases (@/ → src/)
