<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totiao — Acceso VIP</title>
    <meta name="description" content="Únete a la lista VIP de Totiao. El verdadero crunch está por llegar.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glow {
            box-shadow: 0 0 40px rgba(234, 88, 12, 0.3);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Ambient background glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-orange-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Main Content -->
    <main class="relative z-10 max-w-md w-full text-center space-y-8">
        
        <!-- Logo / Brand Mark -->
        <div class="space-y-2">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 mb-4 animate-pulse-slow">
                <span class="text-2xl">🥩</span>
            </div>
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight leading-tight">
                El verdadero <span class="text-orange-500">CRUNCH</span> está por llegar... ⏳
            </h1>
        </div>

        <!-- Subtitle -->
        <p class="text-zinc-400 text-lg leading-relaxed px-2">
            La paila ya casi está lista. Únete a la lista VIP para saber la fecha exacta y llevarte un regalo el día de la apertura.
        </p>

        <!-- CTA Button -->
        <div class="pt-4">
            <a 
                href="https://wa.me/?text=Hola%20Totiao,%20vengo%20de%20Instagram%20y%20quiero%20estar%20en%20la%20lista%20VIP%20secreta%20de%20apertura.%20%F0%9F%A5%A9%F0%9F%94%A5"
                target="_blank"
                rel="noopener noreferrer"
                class="group block w-full bg-orange-600 hover:bg-orange-500 text-white font-bold text-lg py-5 px-8 rounded-2xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] glow"
            >
                <span class="flex items-center justify-center gap-2">
                    Quiero mi Acceso VIP
                    <span class="text-xl transition-transform group-hover:rotate-12">🤫</span>
                </span>
            </a>
            <p class="text-zinc-600 text-xs mt-4">
                Sin spam. Solo lo importante.
            </p>
        </div>

    </main>

    <!-- Footer minimal -->
    <footer class="absolute bottom-6 text-zinc-700 text-[10px] font-medium tracking-wide">
        TOTAIO — 2026
    </footer>

</body>
</html>
